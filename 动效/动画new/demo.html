<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Tree Growth Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    color: #ccc;
    overflow: hidden;
  }

  .stage-wrapper {
    position: relative;
    width: 321px;   /* 107 * 3 */
    height: 459px;  /* 153 * 3 */
    margin-bottom: 40px;
    overflow: visible;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .frame {
    position: absolute;
    bottom: 0;
    opacity: 0;
    transition: none;
    image-rendering: auto;
  }

  /* All frames centered on trunk axis (stage center = 160.5px) */

  /* Frame 1: mound 43x13, trunk center ~x=19 → left = 160.5 - 19*3 = 103.5px */
  .frame-1 {
    width: calc(43px * 3);
    height: calc(13px * 3);
    left: 103.5px;
  }

  /* Frame 2: 65x92, trunk center ~x=38 → left = 160.5 - 38*3 = 46.5px */
  .frame-2 {
    width: calc(65px * 3);
    height: calc(92px * 3);
    left: 46.5px;
  }

  /* Frame 3: 107x105, trunk ~x=64 → left = 160.5 - 64*3 = -31.5px */
  .frame-3 {
    width: calc(107px * 3);
    height: calc(105px * 3);
    left: -31.5px;
  }

  /* Frame 4: 107x105, trunk ~x=64 → left = 160.5 - 64*3 = -31.5px */
  .frame-4 {
    width: calc(107px * 3);
    height: calc(105px * 3);
    left: -31.5px;
  }

  /* Frame 5: 107x153 (stem extended +20), trunk ~x=64 → left = -31.5px */
  .frame-5 {
    width: calc(107px * 3);
    height: calc(153px * 3);
    left: -31.5px;
  }

  /* Frame label */
  .frame-label {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #888;
    white-space: nowrap;
  }

  /* Controls */
  .controls {
    width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .slider-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    background: #333;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #e8d5c4;
    cursor: grab;
    border: 2px solid #fff;
  }

  .progress-text {
    font-size: 13px;
    color: #888;
    min-width: 40px;
    text-align: right;
  }

  .speed-label {
    font-size: 13px;
    color: #888;
    min-width: 44px;
  }

  .frame-indicators {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 10px;
  }
  .frame-indicators span {
    font-size: 11px;
    color: #666;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .frame-indicators span:hover {
    color: #e8d5c4;
    background: rgba(255,255,255,0.05);
  }
  .frame-indicators span.active {
    color: #e8d5c4;
    background: rgba(232,213,196,0.15);
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn {
    padding: 8px 20px;
    border: 1px solid #555;
    background: transparent;
    color: #ccc;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn:hover {
    border-color: #e8d5c4;
    color: #e8d5c4;
  }
  .btn.playing {
    border-color: #e8d5c4;
    background: rgba(232,213,196,0.15);
    color: #e8d5c4;
  }
</style>
</head>
<body>

<div class="stage-wrapper">
  <div class="frame-label" id="frameLabel">Frame 1 - Mound</div>
  <div class="stage">
    <img src="1/枝干.svg" class="frame frame-1" id="f1">
    <img src="2/整颗.svg" class="frame frame-2" id="f2">
    <img src="3/整颗.svg" class="frame frame-3" id="f3">
    <img src="4/整颗.svg" class="frame frame-4" id="f4">
    <img src="5/整只.svg" class="frame frame-5" id="f5">
  </div>
</div>

<div class="controls">
  <div class="slider-row">
    <input type="range" id="slider" min="0" max="1" step="0.002" value="0">
    <span class="progress-text" id="progressText">0%</span>
  </div>
  <div class="frame-indicators">
    <span data-frame="0" class="active">1 Mound</span>
    <span data-frame="0.25">2 Sprout</span>
    <span data-frame="0.5">3 Branch</span>
    <span data-frame="0.75">4 NewShoot</span>
    <span data-frame="1">5 Bloom</span>
  </div>
  <div class="slider-row">
    <span class="speed-label">Speed</span>
    <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
    <span class="progress-text" id="speedText">1.0x</span>
  </div>
  <div class="btn-row">
    <button class="btn" id="playBtn">Play</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
</div>

<script>
const slider = document.getElementById('slider');
const progressText = document.getElementById('progressText');
const frameLabel = document.getElementById('frameLabel');
const frames = [
  document.getElementById('f1'),
  document.getElementById('f2'),
  document.getElementById('f3'),
  document.getElementById('f4'),
  document.getElementById('f5'),
];
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const indicators = document.querySelectorAll('.frame-indicators span');
const speedSlider = document.getElementById('speedSlider');
const speedText = document.getElementById('speedText');

const frameNames = [
  '1 - Mound',
  '2 - Two-Leaf Sprout',
  '3 - Fork Branch',
  '4 - New Shoot',
  '5 - Flower Bud'
];

let animId = null;
let playing = false;

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function updateDisplay(progress) {
  // 4 transitions: 0-0.25, 0.25-0.5, 0.5-0.75, 0.75-1
  const segCount = 4;
  const segLen = 1 / segCount;

  // Determine which segment we're in
  const segIndex = Math.min(Math.floor(progress / segLen), segCount - 1);
  const localT = (progress - segIndex * segLen) / segLen;
  const easedT = easeInOut(Math.min(Math.max(localT, 0), 1));

  // Set all frames invisible
  for (let i = 0; i < 5; i++) {
    frames[i].style.opacity = 0;
  }

  if (progress <= 0) {
    frames[0].style.opacity = 1;
  } else if (progress >= 1) {
    frames[4].style.opacity = 1;
  } else {
    // Cross-fade between segIndex and segIndex+1
    const fromIdx = segIndex;
    const toIdx = segIndex + 1;
    frames[fromIdx].style.opacity = 1 - easedT;
    frames[toIdx].style.opacity = easedT;
  }

  // Scale effect: slight scale-up during transition for organic feel
  for (let i = 0; i < 5; i++) {
    frames[i].style.transform = '';
  }

  if (progress > 0 && progress < 1) {
    const fromIdx = segIndex;
    const toIdx = segIndex + 1;
    // From frame slightly scales up as it fades
    const fromScale = 1 + easedT * 0.03;
    frames[fromIdx].style.transform = `scale(${fromScale})`;
    frames[fromIdx].style.transformOrigin = 'center bottom';
    // To frame scales from slightly smaller
    const toScale = 0.97 + easedT * 0.03;
    frames[toIdx].style.transform = `scale(${toScale})`;
    frames[toIdx].style.transformOrigin = 'center bottom';
  }

  // Update label
  let currentFrame;
  if (progress < 0.125) currentFrame = 0;
  else if (progress < 0.375) currentFrame = 1;
  else if (progress < 0.625) currentFrame = 2;
  else if (progress < 0.875) currentFrame = 3;
  else currentFrame = 4;
  frameLabel.textContent = 'Frame ' + frameNames[currentFrame];

  // Update indicators
  indicators.forEach((ind, i) => {
    const fVal = parseFloat(ind.dataset.frame);
    ind.classList.toggle('active', Math.abs(progress - fVal) < 0.125 + 0.001);
  });

  progressText.textContent = Math.round(progress * 100) + '%';
}

// Slider input
slider.addEventListener('input', () => {
  stopPlay();
  updateDisplay(parseFloat(slider.value));
});

// Click frame indicators to jump
indicators.forEach(ind => {
  ind.addEventListener('click', () => {
    const val = parseFloat(ind.dataset.frame);
    slider.value = val;
    stopPlay();
    updateDisplay(val);
  });
});

// Speed slider
speedSlider.addEventListener('input', () => {
  speedText.textContent = parseFloat(speedSlider.value).toFixed(1) + 'x';
});

// Play button
function startPlay() {
  if (playing) return;
  playing = true;
  playBtn.textContent = 'Pause';
  playBtn.classList.add('playing');

  let startTime = null;
  const startVal = parseFloat(slider.value);
  const baseDuration = 6000; // 6s at 1x speed

  function step(timestamp) {
    if (!playing) return;
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    const speed = parseFloat(speedSlider.value);
    const progress = Math.min(startVal + (elapsed * speed / baseDuration), 1);
    slider.value = progress;
    updateDisplay(progress);
    if (progress < 1) {
      animId = requestAnimationFrame(step);
    } else {
      stopPlay();
    }
  }
  animId = requestAnimationFrame(step);
}

function stopPlay() {
  playing = false;
  playBtn.textContent = 'Play';
  playBtn.classList.remove('playing');
  if (animId) {
    cancelAnimationFrame(animId);
    animId = null;
  }
}

playBtn.addEventListener('click', () => {
  if (playing) {
    stopPlay();
  } else {
    if (parseFloat(slider.value) >= 1) {
      slider.value = 0;
    }
    startPlay();
  }
});

resetBtn.addEventListener('click', () => {
  stopPlay();
  slider.value = 0;
  updateDisplay(0);
});

// Init
updateDisplay(0);
</script>
</body>
</html>
