<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Tree Growth — States 1–5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, sans-serif;
    gap: 28px;
  }
  .stage { width: 320px; height: 380px; }
  .state-bar { display: flex; gap: 12px; align-items: center; }
  .state-dot {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid #cbc3b8;
    background: #fff;
    color: #a89880;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .state-dot.active { border-color: #7B5953; background: #7B5953; color: #fff; }
  .state-dot:not(.active):not(:disabled):hover { border-color: #7B5953; color: #7B5953; }
  .state-dot:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<svg class="stage" viewBox="-40 -10 150 120" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="gT" x1="55" y1="80" x2="85" y2="115" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B5953"/><stop offset="1" stop-color="#977775"/>
    </linearGradient>
    <linearGradient id="gL1" x1="0.5" y1="0" x2="0.5" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#AAAE8F"/><stop offset="1" stop-color="#746D56"/>
    </linearGradient>
    <linearGradient id="gL2" x1="0.5" y1="0" x2="0.5" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#A8AE87"/><stop offset="1" stop-color="#6C644A"/>
    </linearGradient>

    <!-- Ultra-fine noise: high frequency + linear alpha + low opacity overlay -->
    <filter id="noise" x="-10%" y="-10%" width="120%" height="120%"
            filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="bg"/>
      <feBlend mode="normal" in="SourceGraphic" in2="bg" result="shape"/>
      <feTurbulence type="fractalNoise" baseFrequency="120 120" numOctaves="4"
                    stitchTiles="stitch" seed="1277" result="n"/>
      <feColorMatrix in="n" type="luminanceToAlpha" result="an"/>
      <feComponentTransfer in="an" result="cn">
        <feFuncA type="linear" slope="0.6" intercept="0"/>
      </feComponentTransfer>
      <feComposite operator="in" in2="shape" in="cn" result="nc"/>
      <feFlood flood-color="rgba(0,0,0,0.10)" result="cf"/>
      <feComposite operator="in" in2="nc" in="cf" result="c"/>
      <feMerge><feMergeNode in="shape"/><feMergeNode in="c"/></feMerge>
    </filter>
  </defs>

  <path id="trunk" d="" fill="url(#gT)" filter="url(#noise)"/>
  <g id="g1"><path id="leaf1"
    d="M37.6155 33.4913 L38.5 35.3708 C39.3 -3.02915 13.1667 -2.62915 0 2.37085 C3.14209 2.37085 6.09518 3.87165 7.94734 6.4098 L15.3243 16.519 C17.396 19.358 20.2536 21.5284 23.5443 22.7625 L27.649 24.3017 C32.0418 25.949 35.6179 29.2463 37.6155 33.4913 Z"
    fill="url(#gL1)" filter="url(#noise)"/></g>
  <g id="g2"><path id="leaf2"
    d="M47.2927 25.8817 L46.8445 26.0444 C42.9785 27.4477 39.8108 30.3011 38.0126 34 C37.4518 7.94465 55.7705 8.21606 65 11.6087 C62.7929 11.6087 60.7139 12.645 59.3853 14.4074 L55.0671 20.1354 C53.0864 22.7628 50.3857 24.759 47.2927 25.8817 Z"
    fill="url(#gL2)" filter="url(#noise)"/></g>
</svg>

<div class="state-bar">
  <button class="state-dot active" data-s="1">1</button>
  <button class="state-dot" data-s="2">2</button>
  <button class="state-dot" data-s="3">3</button>
  <button class="state-dot" data-s="4" disabled>4</button>
  <button class="state-dot" data-s="5" disabled>5</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/flubber@0.4.2/build/flubber.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
// Paths — unified 107 × 105 space, bottom at y = 105
// ═══════════════════════════════════════════════════

// State 1 — mound (original 43×13, offset +20x +92.29y)
const P_MOUND =
  'M20.62 102.86 C22.04 101.02 26.36 97.77 38.40 92.29 ' +
  'C60.54 98.85 58.08 102.54 58.08 102.54 ' +
  'C59.31 103.15 58.87 105.00 57.50 105.00 ' +
  'L22.79 105.00 ' +
  'C21.20 105.00 19.66 104.12 20.62 102.86 Z';

// State 2 — thin Y trunk (offset +0x +13y)
const P_TRUNK2 =
  'M13 105 C35.8 103 39.1666 65.2042 37.9999 46.8708 ' +
  'C40.3999 46.8708 39.9999 70.5375 39.4999 82.3708 ' +
  'C39.0999 99.1708 56.1667 104.5 65 105 L13 105 Z';

// State 3 trunk is built parametrically by buildSplitTrunk(1)

// ── Leaf connection point ──
const CX = 38, CY = 34;

// ── Per-state leaf props: tx, ty, s (scale around CX/CY), op ──
const STATES = [
  null,
  { trunk: P_MOUND,  l1:{tx:0,ty:13,s:0,op:0}, l2:{tx:0, ty:13,s:0,op:0} },
  { trunk: P_TRUNK2, l1:{tx:0,ty:13,s:1,op:1}, l2:{tx:0, ty:13,s:1,op:1} },
  { trunk: null,      l1:{tx:-33,ty:0,s:1,op:1}, l2:{tx:9,ty:13,s:1,op:1} },
];

// ═══════════════════════════════════════════════════
// Parametric split trunk builder (state 2 ↔ state 3)
//
// The path has 5 cubic segments:
//   seg1: base-left  → left-tip     (left branch outer)
//   seg2: left-tip   → fork         (left branch inner)  ← degenerate at t=0
//   seg3: fork       → right-tip    (right branch inner) ← degenerate at t=0
//   seg4: right-tip  → right-mid    (right branch outer)
//   seg5: right-mid  → base-right   (right side base)
//
// At t=0: seg2 & seg3 collapse to a point (no fork visible)
// At t=1: fully forked state 3
// The fork "descends" from the tip as t grows → visual = split from top
// ═══════════════════════════════════════════════════
function buildSplitTrunk(t) {
  // Direct lerp between EXACT stage-2 and stage-3 SVG control points.
  // t=0 → P_TRUNK2 (3 segs, with 2 degenerate segs at tip = 5 segs total)
  // t=1 → stage-3 整颗.svg trunk path (5 segs)
  const tTop = Math.min(1, t * 1.18);  // tips lead, base follows
  const tMid = t;

  // Tip point — where degenerate segs collapse at t=0
  const tipX = 38, tipY = 46.87;

  // ── Base endpoints (stage-3 x values shifted -33 to keep base center at x=39) ──
  const bLx = 13;                        // FIXED: 13 → 13
  const bRx = 65;                        // FIXED: 65 → 65

  // ── Seg 1: base-left → left-tip (left branch outer) ──
  const s1c1x = lerp(35.8, 35.8, tMid);  // 68.8-33=35.8
  const s1c1y = 103;
  const s1c2x = lerp(39.17, 20.5, tMid); // 53.5-33=20.5
  const s1c2y = lerp(65.2, 61, tMid);
  const ltX   = lerp(tipX, -0.5, tTop);  // 32.5-33=-0.5
  const ltY   = lerp(tipY, 25.5, tTop);

  // ── Seg 2: left-tip → fork (degenerate at t=0) ──
  const s2c1x = lerp(tipX, 23.5, tMid);  // 56.5-33=23.5
  const s2c1y = lerp(tipY, 55.5, tMid);
  const s2c2x = lerp(tipX, 23, tMid);    // 56-33=23
  const s2c2y = lerp(tipY, 60.5, tMid);
  const fX    = lerp(tipX, 31.5, tMid);  // 64.5-33=31.5
  const fY    = lerp(tipY, 81, tMid);

  // ── Seg 3: fork → right-tip (degenerate at t=0) ──
  const s3c1x = lerp(tipX, 31.5, tMid);  // = fX
  const s3c1y = lerp(tipY, 81, tMid);    // = fY
  const s3c2x = lerp(tipX, 57.5, tTop);  // 90.5-33=57.5
  const s3c2y = lerp(tipY, 18.5, tTop);
  const rtX   = lerp(tipX, 49.5, tTop);  // 82.5-33=49.5
  const rtY   = lerp(tipY, 42, tTop);

  // ── Seg 4: right-tip → right-mid ──
  const s4c1x = lerp(40.4, 41.5, tMid);  // 74.5-33=41.5
  const s4c1y = lerp(tipY, 65.5, tMid);
  const s4c2x = lerp(40, 34.99, tMid);   // 67.99-33=34.99
  const s4c2y = lerp(70.54, 81, tMid);
  const rmX   = lerp(39.5, 39, tMid);    // 72-33=39
  const rmY   = lerp(82.37, 91, tMid);

  // ── Seg 5: right-mid → base-right ──
  const s5c1x = lerp(39.1, 44.51, tMid); // 77.51-33=44.51
  const s5c1y = lerp(99.17, 98.04, tMid);
  const s5c2x = lerp(56.17, 58.94, tMid);// 91.94-33=58.94
  const s5c2y = lerp(104.5, 104.66, tMid);

  return `M${bLx} 105 ` +
    `C${s1c1x} ${s1c1y} ${s1c2x} ${s1c2y} ${ltX} ${ltY} ` +
    `C${s2c1x} ${s2c1y} ${s2c2x} ${s2c2y} ${fX} ${fY} ` +
    `C${s3c1x} ${s3c1y} ${s3c2x} ${s3c2y} ${rtX} ${rtY} ` +
    `C${s4c1x} ${s4c1y} ${s4c2x} ${s4c2y} ${rmX} ${rmY} ` +
    `C${s5c1x} ${s5c1y} ${s5c2x} ${s5c2y} ${bRx} 105 ` +
    `L${bLx} 105 Z`;
}

// ═══════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════
const trunkEl = document.getElementById('trunk');
const g1      = document.getElementById('g1');
const g2      = document.getElementById('g2');
const leaf1   = document.getElementById('leaf1');
const leaf2   = document.getElementById('leaf2');
const dots    = document.querySelectorAll('.state-dot');

// ═══════════════════════════════════════════════════
// Flubber — only for 1↔2 (mound ↔ trunk)
// ═══════════════════════════════════════════════════
const morph12 = flubber.interpolate(P_MOUND, P_TRUNK2, { maxSegmentLength: 1 });

// ═══════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════
function lerp(a, b, t) { return a + (b - a) * t; }

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}

function lerpLeaf(a, b, t) {
  return { tx:lerp(a.tx,b.tx,t), ty:lerp(a.ty,b.ty,t), s:lerp(a.s,b.s,t), op:lerp(a.op,b.op,t) };
}

function applyLeaf(gEl, pEl, p) {
  pEl.style.opacity = p.op;
  gEl.setAttribute('transform',
    `translate(${p.tx},${p.ty}) translate(${CX},${CY}) scale(${p.s}) translate(${-CX},${-CY})`);
}

function applyState(idx) {
  const st = STATES[idx];
  trunkEl.setAttribute('d', idx === 3 ? buildSplitTrunk(1) : st.trunk);
  applyLeaf(g1, leaf1, st.l1);
  applyLeaf(g2, leaf2, st.l2);
}

// ═══════════════════════════════════════════════════
// Animation engine
// ═══════════════════════════════════════════════════
let current = 1;
let animId  = null;

applyState(1);

function goToState(target) {
  if (target === current || target < 1 || target > 3) return;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  const chain = [];
  let s = current;
  while (s !== target) {
    const next = s < target ? s+1 : s-1;
    chain.push([s, next]);
    s = next;
  }
  runChain(chain, 0);
}

function runChain(chain, idx) {
  if (idx >= chain.length) { animId = null; return; }
  const [from, to] = chain[idx];
  animateStep(from, to, () => {
    current = to;
    updateDots();
    runChain(chain, idx + 1);
  });
}

function animateStep(from, to, onDone) {
  const stFrom = STATES[from];
  const stTo   = STATES[to];
  const forward = to > from;

  // ── Choose strategy ──
  const isMorph12  = (from===1 && to===2) || (from===2 && to===1);
  const isSplit23  = (from===2 && to===3) || (from===3 && to===2);
  const isGrow     = (from===1 && to===2);
  const isShrink   = (from===2 && to===1);

  const DURATION = isSplit23 ? 1600 : 1400;
  const start = performance.now();

  function frame(now) {
    const raw = Math.min(1, (now - start) / DURATION);
    const t   = easeInOutCubic(raw);

    // ── Trunk ──
    if (isMorph12) {
      trunkEl.setAttribute('d', morph12(forward ? t : 1-t));
    } else if (isSplit23) {
      trunkEl.setAttribute('d', buildSplitTrunk(forward ? t : 1-t));
    }

    // ── Leaves ──
    if (isGrow) {
      // Leaves appear only after trunk is mostly grown (last 20%)
      const lr1 = Math.max(0, (raw - 0.78) / 0.22);
      const lr2 = Math.max(0, (raw - 0.82) / 0.18);
      applyLeaf(g1, leaf1, { tx:stTo.l1.tx, ty:stTo.l1.ty, s:easeOutBack(lr1), op:Math.min(1,lr1*3) });
      applyLeaf(g2, leaf2, { tx:stTo.l2.tx, ty:stTo.l2.ty, s:easeOutBack(lr2), op:Math.min(1,lr2*3) });
    } else if (isShrink) {
      const lr = Math.max(0, 1 - raw/0.3);
      applyLeaf(g1, leaf1, { tx:stFrom.l1.tx, ty:stFrom.l1.ty, s:lr, op:lr });
      applyLeaf(g2, leaf2, { tx:stFrom.l2.tx, ty:stFrom.l2.ty, s:lr, op:lr });
    } else {
      // 2↔3: leaves use EXACT same timing as trunk tips (tTop inside buildSplitTrunk)
      // Trunk: t = easeInOutCubic(raw), then tTop = min(1, t * 1.18)
      const tLeaf = Math.min(1, t * 1.18);
      applyLeaf(g1, leaf1, lerpLeaf(stFrom.l1, stTo.l1, tLeaf));
      applyLeaf(g2, leaf2, lerpLeaf(stFrom.l2, stTo.l2, tLeaf));
    }

    if (raw < 1) {
      animId = requestAnimationFrame(frame);
    } else {
      applyState(to);
      onDone();
    }
  }

  animId = requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════
// State dots
// ═══════════════════════════════════════════════════
function updateDots() {
  dots.forEach(d => d.classList.toggle('active', +d.dataset.s === current));
}
dots.forEach(d => d.addEventListener('click', () => {
  if (d.disabled) return;
  goToState(+d.dataset.s);
}));
</script>
</body>
</html>
