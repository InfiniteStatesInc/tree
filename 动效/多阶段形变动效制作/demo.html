<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祈祷树生长动画 Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #F5F0E8;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: #5A4A3A;
}

.stage {
  position: relative;
  width: 500px;
  height: 430px;
}

.frame {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform-origin: bottom center;
  pointer-events: none;
}
.frame img {
  display: block;
  width: 100%;
  height: 100%;
}

.ground {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 12px;
  background: radial-gradient(ellipse at center, rgba(123,89,83,0.15) 0%, transparent 70%);
  border-radius: 50%;
  transition: width 2s cubic-bezier(0.25,0.46,0.45,0.94);
}

.controls {
  margin-top: 20px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.day-buttons { display: flex; gap: 10px; }
.day-btn {
  padding: 10px 18px;
  background: transparent;
  border: 2px solid #C5B9A8;
  border-radius: 24px;
  font-size: 14px; font-weight: 500;
  color: #8B7355;
  cursor: pointer;
  transition: all 0.3s ease;
  min-width: 56px;
  user-select: none;
}
.day-btn:hover:not(:disabled):not(.active) {
  border-color: #7B5953; color: #7B5953;
  background: rgba(123,89,83,0.05);
}
.day-btn.active {
  background: #7B5953; border-color: #7B5953; color: #F5F0E8;
}
.day-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.info { font-size: 13px; color: #A89880; height: 18px; }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- F1 种子: 34×4 → min 68×8 -->
  <div class="frame" id="f0"
       style="width:68px; height:8px; margin-left:-34px; opacity:1;">
    <img src="demo-assets/F1-种子_整颗_54.svg">
  </div>
  <!-- F2 小芽: 65×92 → 49×70 -->
  <div class="frame" id="f1"
       style="width:49px; height:70px; margin-left:-24.5px; opacity:0;">
    <img src="demo-assets/F2-小芽_整颗.svg">
  </div>
  <!-- F3 分叉: 130×153 → 98×116 -->
  <div class="frame" id="f2"
       style="width:98px; height:116px; margin-left:-49px; opacity:0;">
    <img src="demo-assets/F3-分叉_整颗.svg">
  </div>
  <!-- F4 小树: 132×226 → 100×171 -->
  <div class="frame" id="f3"
       style="width:100px; height:171px; margin-left:-50px; opacity:0;">
    <img src="demo-assets/F4-小树_整颗.svg">
  </div>
  <!-- F5 中树: 312×384 → 236×290 -->
  <div class="frame" id="f4"
       style="width:236px; height:290px; margin-left:-118px; opacity:0;">
    <img src="demo-assets/F5-中树_整颗.svg">
  </div>
  <!-- F6 满开: 661×527 → 500×399 -->
  <div class="frame" id="f5"
       style="width:500px; height:399px; margin-left:-250px; opacity:0;">
    <img src="demo-assets/F6-满开_整颗.svg">
  </div>

  <div class="ground" id="ground"></div>
</div>

<div class="controls">
  <div class="day-buttons">
    <button class="day-btn" onclick="goToDay(0)">Mon</button>
    <button class="day-btn" onclick="goToDay(1)" disabled>Tue</button>
    <button class="day-btn" onclick="goToDay(2)" disabled>Wed</button>
    <button class="day-btn" onclick="goToDay(3)" disabled>Thu</button>
    <button class="day-btn" onclick="goToDay(4)" disabled>Fri</button>
  </div>
  <div class="info" id="info">种子</div>
</div>

<script>
const NAMES = ['种子','小芽','分叉','小树','中树','满开'];
const GROUND_W = [60, 80, 110, 130, 200, 340];
const DAY_TARGETS = [1, 2, 3, 4, 5];

let currentFrame = 0;
let transitioning = false;

const frames = [];
for (let i = 0; i < 6; i++) frames.push(document.getElementById('f' + i));
const buttons = document.querySelectorAll('.day-btn');
const info = document.getElementById('info');
const ground = document.getElementById('ground');

function goToDay(dayIdx) {
  if (transitioning) return;
  const target = DAY_TARGETS[dayIdx];
  if (target <= currentFrame) return;

  buttons[dayIdx].classList.add('active');
  if (dayIdx + 1 < buttons.length) buttons[dayIdx + 1].disabled = false;

  chainTransition(currentFrame, target);
}

async function chainTransition(from, to) {
  transitioning = true;
  for (let i = from; i < to; i++) {
    await doGrowthTransition(i, i + 1);
  }
  currentFrame = to;
  transitioning = false;
  info.textContent = NAMES[to];
}

function doGrowthTransition(fromIdx, toIdx) {
  return new Promise(resolve => {
    const fromEl = frames[fromIdx];
    const toEl = frames[toIdx];
    const duration = 2200;

    const fromH = parseFloat(fromEl.style.height);
    const toH = parseFloat(toEl.style.height);
    const growRatio = toH / fromH;

    // Prepare "to": visible but clipped to tiny ellipse at trunk base
    toEl.style.opacity = '1';
    toEl.style.clipPath = 'ellipse(5% 3% at 50% 100%)';
    toEl.style.transform = `scaleY(${Math.max(0.85, 1/growRatio)}) scaleX(0.9)`;
    toEl.offsetHeight; // force reflow

    const startTime = performance.now();

    function tick(now) {
      const elapsed = now - startTime;
      const rawT = Math.min(elapsed / duration, 1);

      // === "From" frame: stretch up slightly, then fade ===
      const stretchT = easeOutCubic(Math.min(rawT * 1.5, 1));
      const maxStretch = Math.min(growRatio - 1, 0.3);
      const fromScaleY = 1 + stretchT * maxStretch;
      const fromFade = rawT < 0.5 ? 1 : Math.max(0, 1 - (rawT - 0.5) * 2.5);
      fromEl.style.transform = `scaleY(${fromScaleY})`;
      fromEl.style.opacity = fromFade;

      // === "To" frame: ellipse grows from root ===
      const growT = easeOutCubic(Math.max(0, (rawT - 0.03) / 0.92));
      // Vertical grows faster than horizontal (tree grows UP first)
      const ry = 3 + growT * 120;
      const rx = 5 + growT * 100;
      toEl.style.clipPath = `ellipse(${rx}% ${ry}% at 50% 100%)`;

      // Scale decompresses
      const scaleT = easeOutCubic(growT);
      const startScaleY = Math.max(0.85, 1/growRatio);
      const toScaleY = startScaleY + scaleT * (1 - startScaleY);
      const toScaleX = 0.9 + scaleT * 0.1;
      toEl.style.transform = `scaleY(${toScaleY}) scaleX(${toScaleX})`;

      // Ground width
      const gw = GROUND_W[fromIdx] + (GROUND_W[toIdx] - GROUND_W[fromIdx]) * growT;
      ground.style.width = gw + 'px';

      if (rawT < 1) {
        requestAnimationFrame(tick);
      } else {
        fromEl.style.opacity = '0';
        fromEl.style.transform = 'none';
        toEl.style.opacity = '1';
        toEl.style.clipPath = 'none';
        toEl.style.transform = 'none';
        resolve();
      }
    }

    requestAnimationFrame(tick);
  });
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}
</script>
</body>
</html>
